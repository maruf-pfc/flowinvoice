# Bug Report
name: 🐛 Bug Report
description: Report a reproducible bug or unexpected behaviour
title: '[Bug]: '
labels: ['bug', 'needs-triage']
assignees: ['maruf-pfc']

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Clone the repo
        2. Run `bun install`
        3. Run `bun run dev`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run `bun --version`, `node --version`, and `uname -a` and paste the output here.
      placeholder: |
        - Bun: 1.x.x
        - OS: Ubuntu 24.04
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or logs here.
